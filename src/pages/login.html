<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Kaizen 5S</title>
    <link rel="icon" type="image/svg+xml" href="../../assets/kaizen-favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../styles/styles.css" />
  </head>
  <body class="auth-body">
    <div class="bg-glow bg-glow--one" aria-hidden="true"></div>
    <div class="bg-glow bg-glow--two" aria-hidden="true"></div>

    <main class="auth-shell">
      <section class="auth-box" aria-label="Acesso Kaizen 5S">
        <div class="auth-brand">
          <span class="brand__logo"><img src="../../assets/kaizen-logo.png" alt="Logo Kaizen 5S" class="brand__logo-img" /></span>
          <h1>Kaizen 5S</h1>
          <p>Seu controle total começa aqui.</p>
        </div>

        <form id="authForm" class="auth-form" novalidate>
          <h2 id="authTitle">Entrar</h2>

          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" autocomplete="email" required />

          <label for="password">Senha</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />

          <div id="termsWrap" class="terms-wrap is-hidden">
            <label class="terms-checkbox">
              <input id="termsAccepted" name="termsAccepted" type="checkbox" />
              <span>
                Li e aceito os
                <button id="openTermsBtn" class="link-btn" type="button">Termos de Uso</button>
                e Política de Privacidade.
              </span>
            </label>
          </div>

          <p id="authError" class="auth-feedback auth-feedback--error" role="alert" aria-live="polite"></p>
          <p id="authSuccess" class="auth-feedback auth-feedback--success" role="status" aria-live="polite"></p>

          <button id="submitAuthBtn" class="auth-submit-btn" type="submit">Entrar</button>
        </form>

        <button id="toggleModeBtn" class="auth-toggle-btn" type="button">Ainda não tenho conta</button>
      </section>
    </main>

    <div id="termsModal" class="terms-modal is-hidden" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="termsModalTitle">
      <div class="terms-modal__content">
        <div class="terms-modal__header">
          <h3 id="termsModalTitle">Termos de Uso e Política de Privacidade</h3>
          <button id="closeTermsBtn" class="terms-modal__close" type="button" aria-label="Fechar termos">×</button>
        </div>
        <div id="termsModalBody" class="terms-modal__body">
          <p>Placeholder: conteúdo de <strong>TERMOS_E_PRIVACIDADE.md</strong>.</p>
          <p>
            Assim que o ficheiro estiver disponível no repositório, este texto será substituído automaticamente
            com os termos oficiais da plataforma Kaizen 5S.
          </p>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="../scripts/config.js"></script>
    <script src="../scripts/auth.js"></script>
  </body>
</html>
