<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="../scripts/config.js"></script>
    <script src="../scripts/auth_guard.js"></script>
    <title>Estudos - Kaizen 5S</title>
    <link rel="icon" type="image/svg+xml" href="../../assets/kaizen-favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../styles/styles.css" />
    <style>
      /* Estilos Minimalistas Específicos para o Módulo de Estudos (3S) */
      .dashboard-layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 24px;
        margin-top: 24px;
      }
      
      @media(min-width: 1024px) {
        .dashboard-layout {
          grid-template-columns: 2fr 1fr; /* Responsivo com CSS Grid */
        }
      }

      /* Painéis baseados no Minimalismo e 5S */
      .panel-section {
        background: var(--bg-panel);
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .panel-section h2 {
        font-size: 1.25rem;
        color: var(--neon-cyan);
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      /* Matérias - Grid de Cards */
      .subjects-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 16px;
      }

      .subject-card {
        background: var(--bg-panel-strong);
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        transition: transform 0.2s ease, border-color 0.2s ease;
      }

      .subject-card:hover {
        transform: translateY(-2px);
        border-color: var(--neon-cyan);
      }

      .subject-card h3 {
        font-size: 1.1rem;
        color: var(--text-main);
      }

      .btn-quick-access {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 8px 12px;
        border-radius: 8px;
        background: rgba(0, 229, 255, 0.1);
        color: var(--neon-cyan);
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 600;
        border: 1px solid rgba(0, 229, 255, 0.2);
        transition: all 0.2s ease;
      }

      .btn-quick-access:hover {
        background: var(--neon-cyan);
        color: var(--bg-main);
      }

      /* 2S: Atrito Zero - Captura Rápida */
      .quick-capture-form {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        background: var(--bg-panel-strong);
        border: 1px solid var(--line);
        padding: 12px;
        border-radius: var(--radius-md);
      }

      .quick-capture-input {
        flex: 1;
        min-width: 200px;
        background: transparent;
        border: none;
        color: var(--text-main);
        font-family: inherit;
        font-size: 1rem;
        outline: none;
      }
      
      .quick-capture-input::placeholder {
        color: var(--text-soft);
      }

      .quick-capture-select {
        background: var(--bg-main);
        color: var(--text-soft);
        border: 1px solid var(--line);
        padding: 8px 12px;
        border-radius: 8px;
        font-family: inherit;
        outline: none;
        cursor: pointer;
      }

      .quick-capture-select:focus {
        border-color: var(--neon-cyan);
        color: var(--text-main);
      }

      /* Lista de Tarefas (To-Do) */
      .tasks-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        list-style: none;
        padding: 0;
      }

      .task-item {
        display: flex;
        align-items: center;
        gap: 16px;
        background: var(--bg-panel-strong);
        border: 1px solid var(--line);
        padding: 12px 16px;
        border-radius: var(--radius-md);
        transition: all 0.3s ease;
        position: relative; /* Para posicionar o botão de foco */
      }

      .task-item.completed {
        opacity: 0.5;
        border-color: var(--neon-lime);
        background: rgba(156, 255, 0, 0.05);
      }
      
      .task-item.completed .task-text {
        text-decoration: line-through;
        color: var(--text-soft);
      }

      .task-content {
        display: flex;
        flex-direction: column;
        flex: 1; /* Ocupar o espaço disponível */
      }

      .btn-focus {
        background: transparent;
        border: 1px solid var(--neon-cyan);
        color: var(--neon-cyan);
        border-radius: 8px;
        padding: 6px 12px;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: all 0.2s ease;
        margin-left: auto;
      }

      .btn-focus:hover {
        background: rgba(0, 229, 255, 0.1);
        box-shadow: 0 0 8px rgba(0, 229, 255, 0.2);
      }

      .btn-focus svg {
        width: 14px;
        height: 14px;
      }

      .task-checkbox {
        width: 20px;
        height: 20px;
        cursor: pointer;
        appearance: none;
        border: 2px solid var(--text-soft);
        border-radius: 4px;
        background: transparent;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
      }

      .task-checkbox:checked {
        border-color: var(--neon-lime);
        background: var(--neon-lime);
      }

      .task-checkbox:checked::after {
        content: "✓";
        color: var(--bg-main);
        font-weight: bold;
        font-size: 14px;
      }

      .task-content {
        display: flex;
        flex-direction: column;
      }

      .task-text {
        font-size: 1rem;
        transition: all 0.2s ease;
      }

      .task-badge {
        font-size: 0.75rem;
        color: var(--text-soft);
        background: rgba(255, 255, 255, 0.05);
        padding: 2px 8px;
        border-radius: 4px;
        align-self: flex-start;
        margin-top: 4px;
      }

      /* 5S - Feedback Visual (Shitsuke) */
      .toast-container {
        position: fixed;
        bottom: 24px;
        right: 24px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        z-index: 1000;
        pointer-events: none;
      }

      .toast-xp {
        background: var(--neon-lime);
        color: var(--bg-main);
        padding: 12px 24px;
        border-radius: 8px;
        font-weight: 700;
        font-family: "Sora", sans-serif;
        box-shadow: 0 4px 12px rgba(156, 255, 0, 0.3);
        transform: translateY(20px);
        opacity: 0;
        animation: slideInUp 0.3s forwards, fadeOut 0.3s forwards 2.7s;
      }

      @keyframes slideInUp {
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      @keyframes fadeOut {
        to {
          opacity: 0;
        }
      }

      /* 3S: Seiso (Limpeza) - Overlay Temporizador de Foco */
      .focus-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: var(--bg-main);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s ease;
      }

      .focus-overlay.active {
        opacity: 1;
        pointer-events: all;
      }

      .focus-overlay::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at center, rgba(0, 229, 255, 0.05) 0%, transparent 60%);
        pointer-events: none;
      }

      .focus-task-title {
        font-family: "Sora", sans-serif;
        color: var(--text-soft);
        font-size: 1.5rem;
        margin-bottom: 24px;
        text-align: center;
        max-width: 80%;
      }

      .focus-timer {
        font-family: inherit;
        font-size: 8rem;
        font-weight: 700;
        color: var(--neon-cyan);
        text-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
        margin-bottom: 48px;
        line-height: 1;
        font-variant-numeric: tabular-nums;
      }

      .btn-abandon {
        background: transparent;
        border: 1px solid var(--text-soft);
        color: var(--text-soft);
        padding: 12px 24px;
        border-radius: 8px;
        font-family: inherit;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .btn-abandon:hover {
        background: rgba(255, 62, 191, 0.1);
        border-color: var(--neon-pink);
        color: var(--neon-pink);
      }
    </style>
  </head>
  <body>
    <div class="bg-glow bg-glow--one" aria-hidden="true"></div>
    <div class="bg-glow bg-glow--two" aria-hidden="true"></div>

    <div class="app-shell" id="appShell">
      <aside class="sidebar is-open is-pinned" id="sidebar">
        <div class="sidebar__head">
          <div class="brand">
            <span class="brand__logo"><img src="../../assets/kaizen-logo.png" alt="" class="brand__logo-img" /></span>
            <span class="brand__name">Kaizen 5S</span>
          </div>
          <button class="icon-btn icon-btn--pin" id="sidebarToggle" aria-label="Alternar menu lateral" title="Alternar menu lateral"><span class="pin-shape"></span></button>
        </div>
        <a href="perfil.html" class="profile-card">
          <span class="profile-card__avatar" aria-hidden="true">A</span>
          <span class="profile-card__meta">
            <span class="profile-card__name">Aluno</span>
            <span class="profile-card__coins">🟡 150</span>
          </span>
        </a>
        <nav class="sidebar__nav">
          <a href="../../index.html" class="nav-item">
            <span class="nav-icon nav-icon--home"></span><span class="nav-text">Início</span>
          </a>
          <a href="estudos.html" class="nav-item is-active">
            <span class="nav-icon nav-icon--study"></span><span class="nav-text">Estudos</span>
          </a>
          <a href="pesquisa.html" class="nav-item">
            <span class="nav-icon nav-icon--research"></span><span class="nav-text">Pesquisa</span>
          </a>
          <a href="financeiro.html" class="nav-item">
            <span class="nav-icon nav-icon--finance"></span><span class="nav-text">Financeiro</span>
          </a>
          <a href="notas.html" class="nav-item">
            <span class="nav-icon nav-icon--notes"></span><span class="nav-text">Notas</span>
          </a>
          <a href="planejamento.html" class="nav-item">
            <span class="nav-icon nav-icon--calendar"></span><span class="nav-text">Planejamento</span>
          </a>
          <button class="nav-item nav-item--logout" type="button" onclick="handleLogout()" aria-label="Sair da sessão">
            <span class="nav-icon" aria-hidden="true"></span><span class="nav-text">Sair</span>
          </button>
        </nav>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <div class="topbar__title-wrap">
            <p class="eyebrow">Gestão de Conhecimento</p>
            <h1>Módulo de Estudos</h1>
          </div>
        </header>

        <!-- 2S: Atrito Zero - Captura Rápida de Tarefas -->
        <section class="quick-capture-form quick-capture-form--offset">
          <input type="text" id="newTaskInput" class="quick-capture-input" placeholder="O que você precisa estudar ou fazer? (Pressione Enter para salvar)" autocomplete="off" />
          <select id="subjectSelect" class="quick-capture-select" aria-label="Selecionar matéria" title="Selecionar matéria">
            <option value="" disabled selected>Selecione a Matéria</option>
            <!-- Preenchido via JS -->
          </select>
        </section>

        <section class="dashboard-layout">
          <!-- Esquerda: Lista de Tarefas (To-Do) -->
          <article class="panel-section">
            <h2>Tarefas Pendentes</h2>
            <ul class="tasks-list" id="tasksList">
              <!-- Tarefas renderizadas via JS -->
              <li class="tasks-list__loading">Carregando tarefas...</li>
            </ul>
          </article>

          <!-- Direita: Visualização de Matérias (Cards) -->
          <article class="panel-section">
            <h2>Matérias em Andamento</h2>
            <div class="subjects-grid" id="subjectsGrid">
              <!-- Matérias renderizadas via JS -->
              <p class="subjects-grid__loading">Carregando matérias...</p>
            </div>
          </article>
        </section>
      </main>
    </div>

    <!-- Container para Toast (Feedback 5S) -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- 3S: Overlay de Foco Gamificado -->
    <div id="focusOverlay" class="focus-overlay">
      <h2 id="focusTaskTitle" class="focus-task-title">Nome da Tarefa</h2>
      <div id="focusTimerDisplay" class="focus-timer">25:00</div>
      <button id="btnAbandonFocus" class="btn-abandon" onclick="abandonFocus()">Abandonar Foco</button>
    </div>

    <script src="../scripts/script.js"></script>
    <script src="../scripts/gamification.js"></script>
    <script src="../scripts/estudos.js"></script>
  </body>
</html>
